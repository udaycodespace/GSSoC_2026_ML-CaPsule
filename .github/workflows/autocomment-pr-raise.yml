name: Auto Comment,Assign and Link Issue on PR raise

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
    - name: Add Comment to Pull Request
      run: |
        COMMENT=$(cat <<EOF
        {
          "body": "Thank you for submitting your pull request 🙌! Please assign this pull request yourself by commenting `/assign`. We'll review it as soon as possible. If there are any specific instructions or feedback regarding your PR, we'll provide them here. Thanks again for your contribution! 😊"
        } 
        EOF
        )
        RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "$COMMENT")
        cat response.json
        if [ "$RESPONSE" -ne 201 ]; then
          echo "Failed to add comment"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Try assign the author to PR
      uses: actions/github-script@v7
      with:
        script: |
          // Get the username of the person who opened the Pull Request
          const author = context.payload.pull_request.user.login;
          
          console.log(`Assigning PR #${context.issue.number} to ${author}`);
          
          // Assign the author to the PR
          await github.rest.issues.addAssignees({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            assignees: [author]
          });

    - name: link issue to pull request
      uses: actions/github-script@v7
      with:
        script: |
          const issueNumber = context.payload.pull_request.number;
          const issueTitle = context.payload.pull_request.title;
          const issueBody = context.payload.pull_request.body || '';
          
          // Extract issue number from the PR title or body
          const issueMatch = issueTitle.match(/#(\d+)/) || issueBody.match(/#(\d+)/);
          
          if (issueMatch) {
            const linkedIssueNumber = parseInt(issueMatch[1], 10);
            console.log(`Linking PR #${issueNumber} to Issue #${linkedIssueNumber}`);
            
            // Add a comment to the linked issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: linkedIssueNumber,
              body: `This pull request (#${issueNumber}) is linked to this issue.`
            });
          } else {
            // Add a warning comment to the Pull Request itself
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber, 
              body: `No issue found linked to this PR. Please link an issue in the title or body.`
            });
            
            // This marks the workflow as failed 
            core.setFailed('No linked issue found in the PR title or body.');
          }   
          

    
