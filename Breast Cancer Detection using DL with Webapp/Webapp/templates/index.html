<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Detection</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="main-container">

        <div class="left-section">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>

            <h1>Breast Cancer Detection</h1>

            <p class="subtitle">
                AI-powered ultrasound image analysis for early breast cancer detection and healthcare assistance.
            </p>

            <div class="feature-boxes">

                <div class="feature-card">
                    <i class="fa-solid fa-brain"></i>
                    <span>Deep Learning Powered</span>
                </div>

                <div class="feature-card">
                    <i class="fa-solid fa-shield-heart"></i>
                    <span>Medical AI Assistance</span>
                </div>

                <div class="feature-card">
                    <i class="fa-solid fa-hospital"></i>
                    <span>Healthcare Focused</span>
                </div>

            </div>
        </div>

        <div class="upload-card">

            <h2>Upload Ultrasound Image</h2>

            <form method="post" action="/predict" enctype="multipart/form-data">

                <label class="upload-box">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Select or Drag Image</p>

                    <input type="file" name="image" accept="image/*" required>
                </label>

                <button type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Predict Result
                </button>

            </form>

            {% if prediction %}
            <div class="result-card">
                <h3>Prediction Result</h3>

                <div class="prediction">
                    {{ prediction }}
                </div>
            </div>
            {% endif %}

        </div>

    </div>

</body>
</html>
